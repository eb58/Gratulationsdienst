services:
  # 1. PHP & Apache Webserver
  web:
    build: .
    container_name: php_webserver
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./src:/var/www/html
      - ./php-api:/var/www/html/gratulationsdienst/php-api
    depends_on:
      - db


  # 2. MySQL Datenbank-Server
  db:
    image: mysql:8.0
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: test123456!!
      MYSQL_DATABASE: gratulationsdienst
      MYSQL_USER: eb
      MYSQL_PASSWORD: test123456!!
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  # 3. phpMyAdmin Web-Oberfläche
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin_web
    restart: always
    depends_on:
      - db
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
    ports:
      - "8080:80"

volumes:
  db_data:

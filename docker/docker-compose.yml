name: gratulationsdienst

services:
  web:
    image: registry.opencode.de/oc000161649365/gratulationsdienst:latest
    restart: unless-stopped
    ports:
      - '80:80'
    environment:
      GD_DB_DSN: 'mysql:host=db;port=3306;dbname=gratulationsdienst;charset=utf8mb4'
      GD_DB_USER: eb
      GD_DB_PASSWORD: 'changeme!'
      GD_APP_URL: 'https://gradi.meine-domain.de/'
      GD_MAIL_FROM: 'noreply@gradi.meine-domain.de'
      GD_MAIL_FROM_NAME: 'Gratulationsdienst'
      # Hinter einem Reverse-Proxy dessen IP(s) kommagetrennt eintragen,
      # damit die API X-Forwarded-For fuer die Client-IP auswertet.
      GD_TRUSTED_PROXIES: ''
    read_only: true
    tmpfs:
      - /tmp
      - /var/lib/php/sessions
      - /var/lock/apache2
      - /var/run/apache2
    security_opt:
      - no-new-privileges:true
    mem_limit: 512m
    cpus: 1.0
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mariadb:latest
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: 'changeme!!'
      MARIADB_DATABASE: gratulationsdienst
      MARIADB_USER: eb
      MARIADB_PASSWORD: 'changeme!'
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ['CMD-SHELL', 'healthcheck.sh --connect --innodb_initialized']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    mem_limit: 1g
    cpus: 1.0

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:5.2.3
    profiles:
      - admin
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
    ports:
      - '127.0.0.1:8080:80'
    volumes:
      - phpmyadmin_config:/etc/phpmyadmin
    read_only: true
    tmpfs:
      - /tmp
      - /sessions
      - /var/lock/apache2
      - /var/run/apache2
    security_opt:
      - no-new-privileges:true
    mem_limit: 256m
    cpus: 0.5

volumes:
  mariadb_data:
  phpmyadmin_config:

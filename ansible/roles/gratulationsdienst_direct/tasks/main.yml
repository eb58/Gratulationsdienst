---
- name: Zielsystem und Release prüfen
  ansible.builtin.assert:
    that:
      - ansible_os_family == 'Debian'
      - ansible_distribution == 'Debian'
      - (ansible_distribution_major_version | int) >= 12
      - gratulationsdienst_direct_app_url is match('^https://.+/$')
      - gratulationsdienst_direct_hostname | length > 0
      - gratulationsdienst_direct_release_version | length > 0
      - gratulationsdienst_direct_release_src | length > 0
      - gratulationsdienst_direct_tls_mode in ['self_signed', 'provided']
    fail_msg: >-
      Dieses Playbook erwartet Debian ab Version 12, eine vollständige HTTPS-App-URL
      und ein vorhandenes Release-Verzeichnis auf dem Ansible-Steuerrechner.

- name: Vorhandene Zertifikatspfade prüfen
  ansible.builtin.assert:
    that:
      - gratulationsdienst_direct_tls_fullchain_src | length > 0
      - gratulationsdienst_direct_tls_privkey_src | length > 0
    fail_msg: Im TLS-Modus 'provided' müssen fullchain.pem und privkey.pem angegeben werden.
  when: gratulationsdienst_direct_tls_mode == 'provided'

- name: Grundpakete installieren
  ansible.builtin.apt:
    name:
      - apache2
      - ca-certificates
      - mariadb-client
      - mariadb-server
      - openssl
      - php
      - libapache2-mod-php
      - php-cli
      - php-mysql
      - python3-pymysql
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: MariaDB aktivieren und starten
  ansible.builtin.service:
    name: mariadb
    state: started
    enabled: true

- name: Apache-Module aktivieren
  ansible.builtin.command: a2enmod rewrite ssl headers
  register: gratulationsdienst_direct_apache_modules
  changed_when: "'already enabled' not in gratulationsdienst_direct_apache_modules.stdout"
  notify: Apache neu laden

- name: Standard-Apache-Sites deaktivieren
  ansible.builtin.file:
    path: '{{ item }}'
    state: absent
  loop:
    - /etc/apache2/sites-enabled/000-default.conf
    - /etc/apache2/sites-enabled/default-ssl.conf
  notify: Apache neu laden

- name: MariaDB auf localhost begrenzen
  ansible.builtin.template:
    src: mariadb.cnf.j2
    dest: /etc/mysql/mariadb.conf.d/60-gratulationsdienst.cnf
    owner: root
    group: root
    mode: '0644'
  when: gratulationsdienst_direct_manage_mariadb_bind_address | bool
  notify: MariaDB neu starten

- name: Anwendungs- und TLS-Verzeichnisse anlegen
  ansible.builtin.file:
    path: '{{ item.path }}'
    state: directory
    owner: root
    group: root
    mode: '{{ item.mode }}'
  loop:
    - path: '{{ gratulationsdienst_direct_db_secret_dir }}'
      mode: '0700'
    - path: '{{ gratulationsdienst_direct_tls_dir }}'
      mode: '0700'
    - path: '{{ gratulationsdienst_direct_state_dir }}'
      mode: '0755'
    - path: '{{ gratulationsdienst_direct_install_dir }}'
      mode: '0755'

- name: Vorhandenes Datenbankpasswort prüfen
  ansible.builtin.stat:
    path: '{{ gratulationsdienst_direct_db_password_file }}'
  register: gratulationsdienst_direct_db_password_stat
  no_log: true

- name: Datenbankpasswort erzeugen
  ansible.builtin.command:
    argv:
      - openssl
      - rand
      - -base64
      - '32'
  register: gratulationsdienst_direct_generated_db_password
  when: not gratulationsdienst_direct_db_password_stat.stat.exists
  changed_when: true
  no_log: true

- name: Neues Datenbankpasswort speichern
  ansible.builtin.copy:
    content: '{{ gratulationsdienst_direct_generated_db_password.stdout }}'
    dest: '{{ gratulationsdienst_direct_db_password_file }}'
    owner: root
    group: root
    mode: '0600'
  when: not gratulationsdienst_direct_db_password_stat.stat.exists
  no_log: true

- name: Datenbankpasswort lesen
  ansible.builtin.slurp:
    src: '{{ gratulationsdienst_direct_db_password_file }}'
  register: gratulationsdienst_direct_db_password_content
  no_log: true

- name: Datenbankpasswort für die folgenden Aufgaben bereitstellen
  ansible.builtin.set_fact:
    gratulationsdienst_direct_db_password: '{{ gratulationsdienst_direct_db_password_content.content | b64decode | trim }}'
  no_log: true

- name: Datenbankpasswort validieren
  ansible.builtin.assert:
    that:
      - gratulationsdienst_direct_db_password | length >= 32
    fail_msg: Das Datenbankpasswort fehlt oder ist zu kurz.
  no_log: true

- name: Datenbank anlegen
  ansible.mysql.mysql_db:
    name: '{{ gratulationsdienst_direct_db_name }}'
    state: present
    encoding: utf8mb4
    collation: utf8mb4_unicode_ci
    login_unix_socket: /run/mysqld/mysqld.sock

- name: Datenbankbenutzer anlegen und berechtigen
  ansible.mysql.mysql_user:
    name: '{{ gratulationsdienst_direct_db_user }}'
    host: '{{ gratulationsdienst_direct_db_host }}'
    password: '{{ gratulationsdienst_direct_db_password }}'
    priv: '{{ gratulationsdienst_direct_db_name }}.*:ALL'
    state: present
    login_unix_socket: /run/mysqld/mysqld.sock
  no_log: true

- name: Release-Verzeichnis auf dem Steuerrechner prüfen
  ansible.builtin.stat:
    path: '{{ gratulationsdienst_direct_release_src }}'
  delegate_to: localhost
  become: false
  register: gratulationsdienst_direct_release_stat
  run_once: true

- name: Release-Verzeichnis validieren
  ansible.builtin.assert:
    that:
      - gratulationsdienst_direct_release_stat.stat.exists
      - gratulationsdienst_direct_release_stat.stat.isdir
    fail_msg: >-
      Release nicht gefunden: {{ gratulationsdienst_direct_release_src }}.
      Zuerst im Projektverzeichnis `npm run build:release` ausführen.
  run_once: true

- name: Release-Dateien kopieren
  ansible.builtin.copy:
    src: '{{ gratulationsdienst_direct_release_src }}/'
    dest: '{{ gratulationsdienst_direct_install_dir }}/'
    owner: root
    group: www-data
    mode: u=rwX,g=rX,o=rX
    directory_mode: '0755'
  register: gratulationsdienst_direct_release_copy

- name: Release-Dateirechte korrigieren
  ansible.builtin.file:
    path: '{{ gratulationsdienst_direct_install_dir }}'
    state: directory
    recurse: true
    owner: root
    group: www-data
    mode: u=rwX,g=rX,o=rX

- name: Release-Version dokumentieren
  ansible.builtin.copy:
    content: '{{ gratulationsdienst_direct_release_version }}\n'
    dest: '{{ gratulationsdienst_direct_state_dir }}/release-version'
    owner: root
    group: root
    mode: '0644'

- name: PHP-Konfiguration schreiben
  ansible.builtin.template:
    src: config.php.j2
    dest: '{{ gratulationsdienst_direct_install_dir }}/php-api/config.php'
    owner: root
    group: www-data
    mode: '0640'
  no_log: true

- name: Selbstsigniertes Zertifikat prüfen
  ansible.builtin.stat:
    path: '{{ gratulationsdienst_direct_tls_dir }}/{{ item }}'
  loop:
    - fullchain.pem
    - privkey.pem
  register: gratulationsdienst_direct_self_signed_certificates
  when: gratulationsdienst_direct_tls_mode == 'self_signed'

- name: Selbstsigniertes Zertifikat erzeugen
  ansible.builtin.command:
    argv:
      - openssl
      - req
      - -x509
      - -nodes
      - -newkey
      - rsa:3072
      - -days
      - '825'
      - -subj
      - '/CN={{ gratulationsdienst_direct_hostname }}'
      - -addext
      - 'subjectAltName={{ gratulationsdienst_direct_tls_san }}'
      - -keyout
      - '{{ gratulationsdienst_direct_tls_dir }}/privkey.pem'
      - -out
      - '{{ gratulationsdienst_direct_tls_dir }}/fullchain.pem'
  when:
    - gratulationsdienst_direct_tls_mode == 'self_signed'
    - >-
      not (gratulationsdienst_direct_self_signed_certificates.results[0].stat.exists and
      gratulationsdienst_direct_self_signed_certificates.results[1].stat.exists)
  changed_when: true

- name: Vorhandenes TLS-Zertifikat kopieren
  ansible.builtin.copy:
    src: '{{ item.src }}'
    dest: '{{ gratulationsdienst_direct_tls_dir }}/{{ item.dest }}'
    owner: root
    group: root
    mode: '{{ item.mode }}'
  loop:
    - src: '{{ gratulationsdienst_direct_tls_fullchain_src }}'
      dest: fullchain.pem
      mode: '0644'
    - src: '{{ gratulationsdienst_direct_tls_privkey_src }}'
      dest: privkey.pem
      mode: '0600'
  when: gratulationsdienst_direct_tls_mode == 'provided'
  no_log: true

- name: TLS-Dateirechte absichern
  ansible.builtin.file:
    path: '{{ gratulationsdienst_direct_tls_dir }}/{{ item.path }}'
    owner: root
    group: root
    mode: '{{ item.mode }}'
  loop:
    - path: fullchain.pem
      mode: '0644'
    - path: privkey.pem
      mode: '0600'

- name: Apache-VirtualHost konfigurieren
  ansible.builtin.template:
    src: apache-vhost.conf.j2
    dest: /etc/apache2/sites-available/gratulationsdienst.conf
    owner: root
    group: root
    mode: '0644'
  notify: Apache neu laden

- name: Gratulationsdienst-Site aktivieren
  ansible.builtin.command: a2ensite gratulationsdienst.conf
  register: gratulationsdienst_direct_apache_site
  changed_when: "'already enabled' not in gratulationsdienst_direct_apache_site.stdout"
  notify: Apache neu laden

- name: Apache aktivieren und starten
  ansible.builtin.service:
    name: apache2
    state: started
    enabled: true

- name: Apache-Konfiguration testen
  ansible.builtin.command: apache2ctl configtest
  changed_when: false

- name: Handler sofort ausführen
  ansible.builtin.meta: flush_handlers

- name: Health-Endpunkt prüfen
  ansible.builtin.uri:
    url: '{{ gratulationsdienst_direct_app_url }}php-api/index.php/health'
    method: GET
    return_content: true
    status_code: 200
    validate_certs: '{{ gratulationsdienst_direct_tls_validate_certs | bool }}'
  register: gratulationsdienst_direct_health
  until:
    - gratulationsdienst_direct_health.status == 200
    - gratulationsdienst_direct_health.json.ok | default(false)
  retries: 12
  delay: 5

- name: Installationsadresse ausgeben
  ansible.builtin.debug:
    msg: 'Gratulationsdienst: {{ gratulationsdienst_direct_app_url }}'

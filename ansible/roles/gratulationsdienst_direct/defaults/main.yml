---
gratulationsdienst_direct_release_src: '{{ playbook_dir }}/../docker/src/gratulationsdienst'
gratulationsdienst_direct_release_version: 'unversioned'
gratulationsdienst_direct_install_dir: /var/www/html/gratulationsdienst

gratulationsdienst_direct_hostname: '{{ inventory_hostname }}'
gratulationsdienst_direct_app_url: 'https://{{ gratulationsdienst_direct_hostname }}/gratulationsdienst/'
gratulationsdienst_direct_mail_from: noreply@example.org
gratulationsdienst_direct_mail_from_name: Gratulationsdienst Reinickendorf

gratulationsdienst_direct_db_name: gratulationsdienst
gratulationsdienst_direct_db_user: gd_user
gratulationsdienst_direct_db_host: 127.0.0.1
gratulationsdienst_direct_db_secret_dir: /etc/gratulationsdienst
gratulationsdienst_direct_db_password_file: '{{ gratulationsdienst_direct_db_secret_dir }}/db_password'
gratulationsdienst_direct_state_dir: /var/lib/gratulationsdienst

gratulationsdienst_direct_tls_mode: self_signed
gratulationsdienst_direct_tls_san: 'DNS:{{ gratulationsdienst_direct_hostname }}'
gratulationsdienst_direct_tls_days: 825
gratulationsdienst_direct_tls_validate_certs: false
gratulationsdienst_direct_tls_fullchain_src: ''
gratulationsdienst_direct_tls_privkey_src: ''
gratulationsdienst_direct_tls_dir: /etc/gratulationsdienst/tls

gratulationsdienst_direct_manage_mariadb_bind_address: true

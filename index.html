<!doctype html>
<html lang="de">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gratulationsdienst Digital</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="styles.css">
  <script src="vendor/ag-grid-community.min.js"></script>
</head>

<body>
  <a class="skip-link" href="#view">Zum Hauptinhalt springen</a>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <img src="assets/reinickendorf.jpg" alt="" class="brand-mark">
        <div>
          <strong>Gratulationsdienst</strong>
          <span>Reinickendorf</span>
        </div>
        <button type="button" class="nav-toggle" data-nav-toggle aria-label="Menü öffnen" aria-expanded="false" aria-controls="hauptnavigation">
          <span class="nav-toggle-bars" aria-hidden="true"></span>
        </button>
      </div>
      <nav id="hauptnavigation" class="nav" aria-label="Hauptnavigation">
        <details class="nav-section nav-section-collapsible" open>
          <summary class="nav-section-title">Tagesgeschäft</summary>
          <div class="nav-section-items">
            <button type="button" data-nav="dashboard">Dashboard</button>
            <button type="button" data-nav="import">LABO-Import</button>
            <button type="button" data-nav="citizens">Jubilare prüfen</button>
            <button type="button" data-nav="quittung">Quittungsdruck</button>
            <button type="button" data-nav="documents">Dokumentlauf</button>
          </div>
        </details>
        <details class="nav-section nav-section-collapsible" data-admin-only>
          <summary class="nav-section-title">Stammdatenpflege</summary>
          <div class="nav-section-items">
            <button type="button" data-nav="soko">SOKO Mitglieder</button>
            <button type="button" data-nav="regions">SOKO Straßen & Zuständigkeit</button>
            <button type="button" data-nav="map">SOKO Straßenplan</button>
            <button type="button" data-nav="senders">Absender</button>
            <button type="button" data-nav="templates">Vorlagen</button>
            <button type="button" data-nav="quittungStamm">Quittung</button>
          </div>
        </details>
        <details class="nav-section nav-section-collapsible" data-admin-only>
          <summary class="nav-section-title">Sicherheit</summary>
          <div class="nav-section-items">
            <button type="button" data-nav="profile">Mein Zugang</button>
            <button type="button" data-nav="users" data-admin-only>Benutzerverwaltung</button>
          </div>
        </details>
      </nav>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h1 id="page-title">Dashboard</h1>
        </div>
        <div id="topbar-actions" class="topbar-actions"></div>
      </header>
      <section id="view" class="view" tabindex="-1" aria-live="polite"></section>
    </main>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="data/soko-strassenverzeichnis.js"></script>
  <script src="data/reinickendorf-street-geometries.js"></script>
  <script src="data/reinickendorf-address-points.js"></script>
  <script type="module" src="app.js"></script>
</body>

</html>

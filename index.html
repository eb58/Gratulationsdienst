<!doctype html>
<html lang="de">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gratulationsdienst Digital</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="styles.css">
  <script src="vendor/ag-grid-community.min.js"></script>
</head>

<body>
  <a class="skip-link" href="#view">Zum Hauptinhalt springen</a>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <img src="assets/reinickendorf.jpg" alt="" class="brand-mark">
        <div>
          <strong>Gratulationsdienst</strong>
          <span>Reinickendorf</span>
        </div>
        <button type="button" class="nav-toggle" data-nav-toggle aria-label="Menü öffnen" aria-expanded="false" aria-controls="hauptnavigation">
          <span class="nav-toggle-bars" aria-hidden="true"></span>
        </button>
      </div>
      <svg class="nav-icons" aria-hidden="true">
        <symbol id="icon-dashboard" viewBox="0 0 24 24"><path d="M4 13h6V4H4v9zm10 7h6V4h-6v16zM4 20h6v-4H4v4z"></path></symbol>
        <symbol id="icon-import" viewBox="0 0 24 24"><path d="M12 3v10m0 0 4-4m-4 4-4-4M5 17v3h14v-3"></path></symbol>
        <symbol id="icon-citizens" viewBox="0 0 24 24"><path d="M16 19c0-2.2-1.8-4-4-4s-4 1.8-4 4M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8zm6 1.5c1.8.7 3 2.2 3 4.5M18 9a3 3 0 0 0-2-2.8"></path></symbol>
        <symbol id="icon-receipt" viewBox="0 0 24 24"><path d="M6 3h12v18l-3-2-3 2-3-2-3 2V3zm4 6h8m-8 4h8m-8 4h4"></path></symbol>
        <symbol id="icon-documents" viewBox="0 0 24 24"><path d="M7 3h7l4 4v14H7V3zm7 0v5h4M10 12h5m-5 4h5"></path></symbol>
        <symbol id="icon-soko" viewBox="0 0 24 24"><path d="M8 11a3 3 0 1 0 0-6 3 3 0 0 0 0 6zm8 0a3 3 0 1 0 0-6 3 3 0 0 0 0 6zM3 20c.4-3 2.4-5 5-5s4.6 2 5 5m-2 0c.4-3 2.4-5 5-5s4.6 2 5 5"></path></symbol>
        <symbol id="icon-regions" viewBox="0 0 24 24"><path d="M4 6l5-2 6 2 5-2v14l-5 2-6-2-5 2V6zm5-2v14m6-12v14"></path></symbol>
        <symbol id="icon-map" viewBox="0 0 24 24"><path d="M12 21s7-5.1 7-11a7 7 0 1 0-14 0c0 5.9 7 11 7 11zm0-8a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"></path></symbol>
        <symbol id="icon-senders" viewBox="0 0 24 24"><path d="M4 6h16v12H4V6zm0 1 8 6 8-6"></path></symbol>
        <symbol id="icon-templates" viewBox="0 0 24 24"><path d="M5 4h14v16H5V4zm4 4h6m-6 4h6m-6 4h3"></path></symbol>
        <symbol id="icon-profile" viewBox="0 0 24 24"><path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8zm-7 8c.6-3.4 3.2-5 7-5s6.4 1.6 7 5"></path></symbol>
        <symbol id="icon-privacy" viewBox="0 0 24 24"><path d="M12 3l7 3v5c0 4.5-2.7 8.4-7 10-4.3-1.6-7-5.5-7-10V6l7-3zm-2 9 2 2 4-5"></path></symbol>
        <symbol id="icon-users" viewBox="0 0 24 24"><path d="M9 11a3 3 0 1 0 0-6 3 3 0 0 0 0 6zm6.5 1a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5zM3 20c.5-3.2 2.7-5 6-5s5.5 1.8 6 5m-1.5-4.5c2.9.2 4.8 1.8 5.5 4.5"></path></symbol>
      </svg>
      <nav id="hauptnavigation" class="nav" aria-label="Hauptnavigation">
        <details class="nav-section nav-section-collapsible" open>
          <summary class="nav-section-title">Tagesgeschäft</summary>
          <div class="nav-section-items">
            <button type="button" data-nav="dashboard" title="Dashboard"><svg class="nav-icon" aria-hidden="true"><use href="#icon-dashboard"></use></svg><span class="nav-label">Dashboard</span></button>
            <button type="button" data-nav="import" title="LABO-Import"><svg class="nav-icon" aria-hidden="true"><use href="#icon-import"></use></svg><span class="nav-label">LABO-Import</span></button>
            <button type="button" data-nav="citizens" title="Jubilare prüfen"><svg class="nav-icon" aria-hidden="true"><use href="#icon-citizens"></use></svg><span class="nav-label">Jubilare prüfen</span></button>
            <button type="button" data-nav="quittung" title="Quittungsdruck"><svg class="nav-icon" aria-hidden="true"><use href="#icon-receipt"></use></svg><span class="nav-label">Quittungsdruck</span></button>
            <button type="button" data-nav="documents" title="Dokumentlauf"><svg class="nav-icon" aria-hidden="true"><use href="#icon-documents"></use></svg><span class="nav-label">Dokumentlauf</span></button>
          </div>
        </details>
        <details class="nav-section nav-section-collapsible" data-admin-only>
          <summary class="nav-section-title">Stammdatenpflege</summary>
          <div class="nav-section-items">
            <button type="button" data-nav="soko" title="SOKO Mitglieder"><svg class="nav-icon" aria-hidden="true"><use href="#icon-soko"></use></svg><span class="nav-label">SOKO Mitglieder</span></button>
            <button type="button" data-nav="regions" title="SOKO Straßen & Zuständigkeit"><svg class="nav-icon" aria-hidden="true"><use href="#icon-regions"></use></svg><span class="nav-label">SOKO Straßen & Zuständigkeit</span></button>
            <button type="button" data-nav="map" title="SOKO Straßenplan"><svg class="nav-icon" aria-hidden="true"><use href="#icon-map"></use></svg><span class="nav-label">SOKO Straßenplan</span></button>
            <button type="button" data-nav="senders" title="Absender"><svg class="nav-icon" aria-hidden="true"><use href="#icon-senders"></use></svg><span class="nav-label">Absender</span></button>
            <button type="button" data-nav="templates" title="Vorlagen"><svg class="nav-icon" aria-hidden="true"><use href="#icon-templates"></use></svg><span class="nav-label">Vorlagen</span></button>
            <button type="button" data-nav="quittungStamm" title="Quittung"><svg class="nav-icon" aria-hidden="true"><use href="#icon-receipt"></use></svg><span class="nav-label">Quittung</span></button>
          </div>
        </details>
        <details class="nav-section nav-section-collapsible" data-admin-only>
          <summary class="nav-section-title">Administration</summary>
          <div class="nav-section-items">
            <button type="button" data-nav="profile" title="Mein Zugang"><svg class="nav-icon" aria-hidden="true"><use href="#icon-profile"></use></svg><span class="nav-label">Mein Zugang</span></button>
            <button type="button" data-nav="privacy" data-admin-only title="Datenschutz"><svg class="nav-icon" aria-hidden="true"><use href="#icon-privacy"></use></svg><span class="nav-label">Datenschutz</span></button>
            <button type="button" data-nav="users" data-admin-only title="Benutzerverwaltung"><svg class="nav-icon" aria-hidden="true"><use href="#icon-users"></use></svg><span class="nav-label">Benutzerverwaltung</span></button>
          </div>
        </details>
      </nav>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="topbar-title">
          <button type="button" class="sidebar-toggle" data-sidebar-toggle aria-label="Menue einklappen" aria-expanded="true" aria-controls="hauptnavigation" title="Menue einklappen">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 5h16"></path>
              <path d="M4 12h16"></path>
              <path d="M4 19h16"></path>
              <path d="m15 9-3 3 3 3"></path>
            </svg>
          </button>
          <h1 id="page-title">Dashboard</h1>
        </div>
        <div id="topbar-actions" class="topbar-actions"></div>
      </header>
      <section id="view" class="view" tabindex="-1" aria-live="polite"></section>
    </main>
  </div>

  <div id="busy-indicator" class="busy-indicator" role="status" aria-live="polite" aria-label="Vorgang läuft" hidden>
    <div class="busy-box">
      <span class="busy-spinner" aria-hidden="true"></span>
      <span>Bitte warten</span>
    </div>
  </div>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="data/soko-strassenverzeichnis.js"></script>
  <script src="data/reinickendorf-street-geometries.js"></script>
  <script src="data/reinickendorf-address-points.js"></script>
  <script type="module" src="app.js"></script>
</body>

</html>

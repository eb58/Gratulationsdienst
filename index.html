<!doctype html>
<html lang="de">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gratulationsdienst Digital</title>
  <link rel="stylesheet" href="styles.css">
  <script src="vendor/ag-grid-community.min.js"></script>
</head>

<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <img src="assets/reinickendorf.jpg" alt="" class="brand-mark">
        <div>
          <strong>Gratulationsdienst</strong>
          <span>Reinickendorf</span>
        </div>
      </div>
      <nav class="nav" aria-label="Hauptnavigation">
        <div class="nav-section">
          <span class="nav-section-title">Tagesgeschäft</span>
          <button type="button" data-nav="import">LABO-Import</button>
          <button type="button" data-nav="citizens">Jubilare prüfen</button>
          <button type="button" data-nav="quittung">Quittungsdruck</button>
          <button type="button" data-nav="documents">Dokumentlauf</button>
        </div>
        <div class="nav-section">
          <span class="nav-section-title">Stammdatenpflege</span>
          <button type="button" data-nav="soko">SOKO</button>
          <button type="button" data-nav="regions">SOKO Straßen & Zuständigkeit</button>
          <button type="button" data-nav="map">SOKO-Karte</button>
          <button type="button" data-nav="senders">Absender</button>
          <button type="button" data-nav="templates">Vorlagen</button>
          <button type="button" data-nav="quittungStamm">Quittung</button>
          <button type="button" data-action="reset-data">Beispieldaten</button>
        </div>
      </nav>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h1 id="page-title">Übersicht</h1>
        </div>
      </header>
      <section id="view" class="view" aria-live="polite"></section>
    </main>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="data/soko-strassenverzeichnis.js"></script>
  <script src="data/reinickendorf-street-geometries.js"></script>
  <script src="data/reinickendorf-address-points.js"></script>
  <script type="module" src="app.js"></script>
</body>

</html>
